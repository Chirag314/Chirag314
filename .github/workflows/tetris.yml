name: Update Contribution Tetris

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "17 * * * *"   # hourly (pick any minute)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tetris-svg
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate SVG
        env:
          GITHUB_USERNAME: Chirag314
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-tetris-svg1.js
          python -c "import xml.etree.ElementTree as ET; ET.parse('output/tetris.svg'); print('SVG OK ✅')"
          ! grep -n '<<<<<<<\|=======\|>>>>>>>' -n output/tetris.svg

      - name: Publish to tetris-output branch
        run: |
          set -euo pipefail

          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          rm -rf /tmp/out
          if git clone --depth 1 --branch tetris-output "$REPO_URL" /tmp/out 2>/dev/null; then
            echo "Using existing tetris-output branch"
          else
            echo "Creating new tetris-output branch"
            mkdir /tmp/out
            cd /tmp/out
            git init
            git remote add origin "$REPO_URL"
            git checkout --orphan tetris-output
            cd -
          fi

          mkdir -p /tmp/out/output
          cp -f output/tetris.svg /tmp/out/output/tetris.svg

          cd /tmp/out
          git add output/tetris.svg
          git commit -m "chore: update tetris svg [skip ci]" || echo "No changes to commit"
          git push origin tetris-output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
